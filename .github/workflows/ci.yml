name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DB_HOST: 127.0.0.1
  DB_PUERTO: 3306
  DB_USUARIO: root
  DB_CONTRASENA: root
  DB_NOMBRE: spa_unas

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json

      - name: Instalar frontend
        run: npm ci
        working-directory: frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Instalar backend
        run: npm ci
        working-directory: backend

      - name: Lint backend
        run: npm run lint
        working-directory: backend

      - name: Tests unitarios backend
        run: npm test
        working-directory: backend

      - name: Verificar sintaxis backend
        run: node --check src/index.js
        working-directory: backend

  integracion-e2e:
    runs-on: ubuntu-latest
    needs: unit
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: spa_unas
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json
            package-lock.json

      - name: Instalar dependencias
        run: |
          npm ci
          npm ci --prefix frontend
          npm ci --prefix backend

      - name: Preparar base de datos
        run: bash backend/scripts/preparar-bd-ci.sh

      - name: Tests integracion
        run: npm run test:integracion
        working-directory: backend
        env:
          TEST_INTEGRACION: '1'
          NODE_ENV: desarrollo
          LOG_NIVEL: error

      - name: Instalar Playwright
        run: npx playwright install chromium --with-deps

      - name: Tests E2E
        run: npm run test:e2e
        env:
          CI: '1'
          NODE_ENV: desarrollo
          LOG_NIVEL: error
